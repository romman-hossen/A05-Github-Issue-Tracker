<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- title and logo -->
    <title>GitHub | Login</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- Tailwind+DaisyUi -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--font awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- styleSheet -->
     <link rel="stylesheet" href="./style/style.css">
     <style>
     
     </style>
  </head>
  <body class="bg-[#F8FAFC] min-h-screen "> 
    <!-- Navbar section -->
   <header class="bg-white shadow py-4">
   <nav class="flex space-y-10 md:space-y-0 flex-col md:flex-row justify-between items-center w-11/12 mx-auto">
      <div class="flex flex-col md:flex-row items-center gap-1">
         <img class="w-[30%] md:w-[36px]" src="./assets/github-logo.png" alt="">
          <h3 class="text-2xl font-semibold">GitHub Issues Tracker</h3>
      </div>
      <div class="flex flex-col md:flex-row gap-4">
         <input id="search-issu" type="text" placeholder= "Search issues..." class="input input-bordered w-full md:w-auto" />
        <button class="btn btn-primary">+ New Issue</button>
      </div>
   </nav>
   </header>
   <section class="w-10/12 mx-auto py-15">
    <!-- button section -->
    <section class=" bg-white p-6 rounded-lg flex gap-3 shadow">
      <button id="btn-all" class="filter-btn px-10 btn-primary btn ">All</button>
      <button id="btn-open" class="filter-btn px-8 btn btn-base-100 gray">Open</button>
      <button id="btn-closed" class="filter-btn px-7 btn  gray">Closed</button>
    </section>
    <!-- Issus section -->
    <section Class=" bg-white p-6 rounded-sm mt-4 shadow">
      <div class="flex justify-between items-center">
        <div class="flex items-center gap-2">
          <div class="bg-purple-100 p-2 rounded-full">
            <img src="./assets/Aperture.png" alt="">
          </div>
          <div class="">
            <h3 class="text-xl font-semibold"><span id="total">50</span> Issues</h3>
            <p class="gray">Track and manage your project issues</p>
          </div>
        </div>
        <div>
          <div class="flex items-center gap-1">
            <div class="w-3 h-3 bg-green-500 rounded-full">
            </div>
            <span class="pr-4 font-medium">Open</span>
            <div class="w-3 h-3 bg-purple-500 rounded-full">
            </div>
            <span class="font-medium">
              Closed
            </span>
          </div>
        </div>
      </div>
    </section>
    <section id="issues-container" class="bg-[#FBFBFB] shadow border-t-1 border-gray-200 p-6 grid grid-cols-4 gap-3">
     <div class="bg-white p-4 rounded-sm shadow space-y-3">
      <div class="flex justify-between">
        <div>
          <img src="./assets/Open-Status.png" alt="">
        </div>
        <span class="bg-gray-100 text-gray-400 px-5 py-1 rounded-4xl">High</span>
      </div>
      
      <div>
        <h3 class="font-semibold">Fix navigation menu on mobile devices</h3>
        <p class="gray">The navigation menu doesn't collapse properly on mobile devices...</p>
      </div>
      <div>
        <span class="bg-pink-100 text-red-400 px-5 py-1 rounded-4xl">Bug</span>
        <span class="bg-yellow-200 text-orange-300 px-5 py-1 rounded-4xl">help wanted</span>
        
      </div>
     </div>

    </section>
    <!-- <section class="grid grid-cols-4">
      <div>
       <div class="">
        <img src="./assets/Open-Status.png" alt="">
        <span class="bg-pink-100 text-red-400 px-5 py-1 rounded-4xl">High</span>
      </div>
      <div>
        <h3>Fix navigation menu on mobile devices</h3>
        <p>The navigation menu doesn't collapse properly on mobile devices...</p>
      </div>
      <div>
        <span>Bug</span>
        <span>help wanted</span>
      </div>
     
    </section> -->

   </section>

    <script src="./script/home.js"></script>
  </body>
</html>
