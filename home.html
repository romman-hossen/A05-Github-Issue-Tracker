<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- title and logo -->
    <title>GitHub | Login</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- Tailwind+DaisyUi -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--font awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- styleSheet -->
     <link rel="stylesheet" href="./style/style.css">
     <style>
     
     </style>
  </head>
  <body class="bg-[#F8FAFC] min-h-screen "> 
   <header class="bg-white shadow py-4">
   <nav class="flex space-y-10 md:space-y-0 flex-col md:flex-row justify-between items-center w-11/12 mx-auto">
      <div class="flex flex-col md:flex-row items-center gap-1">
         <img class="w-[30%] md:w-[36px]" src="./assets/github-logo.png" alt="">
          <h3 class="text-2xl font-semibold">GitHub Issues Tracker</h3>
      </div>
      <div class="flex flex-col md:flex-row gap-4">
         <input id="search-issu" type="text" placeholder= "Search issues..." class="input input-bordered w-full md:w-auto" />
        <button class="btn btn-primary">+ New Issue</button>
      </div>
   </nav>
   </header>
   <section class="w-10/12 mx-auto my-15">
    <section class=" bg-white p-6 rounded-lg flex gap-3">
      <button id="btn-all" class="filter-btn px-10 btn-primary btn ">All</button>
      <button id="btn-open" class="filter-btn px-8 btn btn-base-100 gray">Open</button>
      <button id="btn-closed" class="filter-btn px-7 btn  gray">Closed</button>
    </section>

   </section>

    <script src="./script/home.js"></script>
  </body>
</html>
