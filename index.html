<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- title and logo -->
    <title>GitHub | Login</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- Tailwind+DaisyUi -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--font awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- styleSheet -->
     <link rel="stylesheet" href="./style/style.css">
  </head>
  <body>
   <section class="flex min-h-full py-25 justify-center">
     <div class="card bg-base-100 w-full max-w-md mx-6  py-20 p-6 shadow-2xl md:mx-auto">
        <div class="flex justify-center text-center">
            <div class="space-y-6">
                <div class="flex justify-center">
                    <img src="./assets/github-logo.png" alt="">
                </div>
                <div class="space-y-1">
                    <h3 class="text-2xl font-bold">GitHub Issues Tracker</h3>
                    <p class="gray">Sign in to manage your issues</p>
                </div>
            </div>
        </div>
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-black font-semibold">Username</label>
          <input id="input-username" type="text" class="input gray w-full" value="admin" placeholder="Enter Username" />
          <label class="label text-black font-semibold">Password</label>
          <input id="input-password" type="password" class="input gray w-full" value="admin123" placeholder="Enter Password" />
          <!-- <div><a class="link link-hover">Forgot password?</a></div> -->
          <button id="sign-in-btn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
      </div>
    </div>

   </section>

   <script src="./script/login.js"></script>
  </body>
</html>
